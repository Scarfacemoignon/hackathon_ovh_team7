apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: namespaces
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Scarfacemoignon/hackathon_ovh_team7.git
    targetRevision: main
    path: infra/namespaces
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: false      # jamais de suppression automatique d'un namespace
      selfHeal: true
