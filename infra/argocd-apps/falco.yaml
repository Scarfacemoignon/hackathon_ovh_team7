apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: falco
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://falcosecurity.github.io/charts
    chart: falco
    targetRevision: "*"
    helm:
      values: |
        driver:
          kind: modern_ebpf     # driver eBPF moderne, adapté aux clusters managés (pas d'accès au kernel des nodes)
        falcosidekick:
          enabled: true         # pour exporter les alertes (webhook, Slack, etc.)
          webui:
            enabled: true       # petite UI de visualisation des alertes
            existingSecret: "falco-ui-credentials"   # cree hors Git : kubectl create secret generic falco-ui-credentials -n falco --from-literal=FALCOSIDEKICK_UI_USER="admin:<mot-de-passe>"
  destination:
    server: https://kubernetes.default.svc
    namespace: falco
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions:
      - CreateNamespace=true
