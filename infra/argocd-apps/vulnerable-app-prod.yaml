apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vulnerable-app-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Scarfacemoignon/hackathon_ovh_team7.git
    targetRevision: main
    path: apps/vulnerable-app/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: prod
  syncPolicy:
    # Pas de "automated" : promotion manuelle uniquement, apres validation complete de staging.
    syncOptions:
      - CreateNamespace=true
