apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: trivy-operator
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://aquasecurity.github.io/helm-charts/
    chart: trivy-operator
    targetRevision: "*"
    helm:
      values: |
        trivy:
          ignoreUnfixed: true    # ne remonte que les CVE ayant un correctif
        serviceMonitor:
          enabled: true          # expose les métriques pour Prometheus
          labels:
            release: kube-prometheus-stack   # requis : Prometheus ne scrape que les ServiceMonitor portant ce label
  destination:
    server: https://kubernetes.default.svc
    namespace: trivy-system
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions:
      - CreateNamespace=true
