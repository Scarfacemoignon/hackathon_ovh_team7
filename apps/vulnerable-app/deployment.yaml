apiVersion: apps/v1
kind: Deployment
metadata:
  name: vulnerable-web
  namespace: demo
spec:
  replicas: 1
  selector:
    matchLabels: { app: vulnerable-web }
  template:
    metadata:
      labels: { app: vulnerable-web }
    spec:
      containers:
        - name: web
          # FAILLE 1 : image très ancienne, bourrée de CVE connues
          image: nginx:1.14
          # FAILLE 2 : conteneur privilégié = accès quasi-root au node
          securityContext:
            privileged: true
            runAsUser: 0          # FAILLE 3 : tourne en root
          # FAILLE 4 : aucune limite CPU/mémoire
          ports:
            - containerPort: 80
