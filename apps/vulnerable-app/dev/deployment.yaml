apiVersion: apps/v1
kind: Deployment
metadata:
  name: vulnerable-web
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels: { app: vulnerable-web }
  template:
    metadata:
      labels: { app: vulnerable-web }
    spec:
      containers:
        - name: web
          image: nginx:latest
          securityContext:
            privileged: false
            runAsUser: 1000
          resources:
            limits:
              cpu: "500m"
              memory: "256Mi"
            requests:
              cpu: "250m"
              memory: "128Mi"
          ports:
            - containerPort: 80
          volumeMounts:
            - name: cache-volume
              mountPath: /var/cache/nginx
            - name: run-volume
              mountPath: /var/run
      volumes:
        - name: cache-volume
          emptyDir: {}
        - name: run-volume
          emptyDir: {}
