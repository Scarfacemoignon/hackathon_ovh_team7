apiVersion: apps/v1
kind: Deployment
metadata:
  name: vulnerable-web
  namespace: prod
spec:
  replicas: 1
  selector:
    matchLabels: { app: vulnerable-web }
  template:
    metadata:
      labels: { app: vulnerable-web }
    spec:
      containers:
        - name: web
          image: nginx:1.23.3
          securityContext:
            runAsUser: 1000
          resources:
            limits:
              cpu: "500m"
              memory: "256Mi"
            requests:
              cpu: "250m"
              memory: "128Mi"
          ports:
            - containerPort: 80
          volumeMounts:
            - name: cache
              mountPath: /var/cache/nginx
            - name: run
              mountPath: /var/run
      volumes:
        - name: cache
          emptyDir: {}
        - name: run
          emptyDir: {}
